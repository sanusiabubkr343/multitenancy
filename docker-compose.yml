# docker-compose.yml
version: '3.8'

services:
  postgres-master:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: master_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_master_data:/var/lib/postgresql/data

  postgres-tenant:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_tenant_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      MASTER_DATABASE_URL: postgresql://postgres:password@postgres-master:5432/master_db
    depends_on:
      - postgres-master
      - postgres-tenant
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_master_data:
  postgres_tenant_data: